<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>認識時鐘小遊戲</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      background: #fff;
      border-radius: 20px;
      padding: 1.5rem 1.25rem 2rem;
      width: 340px;
      max-width: 95vw;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      user-select: none;
      -webkit-user-select: none;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #3C3489;
      margin-bottom: 1rem;
      letter-spacing: 0.02em;
    }
    #question-box {
      font-size: 22px;
      font-weight: 500;
      color: #2c2c2a;
      margin-bottom: 0.4rem;
      min-height: 36px;
    }
    #target-time { color: #3C3489; }
    #score-box {
      font-size: 14px;
      color: #888780;
      margin-bottom: 0.75rem;
    }
    #clock-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    canvas { touch-action: none; cursor: grab; border-radius: 50%; }
    #hint {
      font-size: 13px;
      color: #888780;
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }
    .h-label { color: #D85A30; font-weight: 600; }
    .m-label { color: #185FA5; font-weight: 600; }
    #feedback {
      font-size: 18px;
      font-weight: 500;
      min-height: 28px;
      margin-bottom: 0.75rem;
    }
    .btn-row { display: flex; justify-content: center; gap: 10px; }
    .btn {
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 10px;
      border: 1.5px solid #d3d1c7;
      background: #fff;
      color: #2c2c2a;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); background: #f1efe8; }
    #check-btn {
      background: #3C3489;
      color: #fff;
      border-color: #3C3489;
    }
    #check-btn:active { background: #26215C; }
  </style>
</head>
<body>
<div id="app">
  <h1>🕐 我會撥時鐘</h1>
  <div id="question-box">請把時鐘撥到 <span id="target-time"></span></div>
  <div id="score-box">答對：<span id="correct">0</span> 題 &nbsp;|&nbsp; 共 <span id="total">0</span> 題</div>
  <div id="clock-wrap">
    <canvas id="clock" width="300" height="300"></canvas>
  </div>
  <div id="hint">
    抓住 <span class="h-label">● 短針尖端</span> 或 <span class="m-label">● 長針尖端</span> 拖曳
  </div>
  <div id="feedback"></div>
  <div class="btn-row">
    <button class="btn" id="check-btn" onclick="checkAnswer()">✓ 確認答案</button>
    <button class="btn" onclick="newQuestion()">下一題 →</button>
  </div>
</div>

<script>
const canvas = document.getElementById('clock');
const ctx = canvas.getContext('2d');
const W = 300, CX = 150, CY = 150, R = 130;
const H_LEN = 72, M_LEN = 105, GRAB_R = 36;

let hourAngle = 90;
let minAngle = 0;
let hourAngleFree = 90;
let minAngleFree = 0;
let targetH = 3, targetM = 0;
let dragging = null;
let correct = 0, total = 0;
let answered = false;

function d2r(d) { return d * Math.PI / 180; }
function tipXY(angleDeg, len) {
  const r = d2r(angleDeg - 90);
  return [CX + len * Math.cos(r), CY + len * Math.sin(r)];
}
function dist(x1,y1,x2,y2) { return Math.hypot(x1-x2,y1-y2); }
function getAngleDeg(x,y) {
  let a = Math.atan2(y-CY,x-CX)*180/Math.PI+90;
  return ((a%360)+360)%360;
}
function snapTo(angle, step) {
  let s = Math.round(angle/step)*step;
  return ((s%360)+360)%360;
}
function dispH() { return dragging==='h' ? hourAngleFree : hourAngle; }
function dispM() { return dragging==='m' ? minAngleFree : minAngle; }

function angleToHM(a) {
  let snap = Math.round(((a%360)+360)%360 / 15) % 24;
  let hour = Math.floor(snap/2);
  let isHalf = snap % 2 === 1;
  return { h: hour===0?12:hour, m: isHalf?30:0 };
}
function angleToMin(a) {
  let snap = Math.round(((a%360)+360)%360 / 30) % 12;
  return snap * 5;
}
function targetHourAngle(h, m) {
  return ((h%12)*30 + (m===30?15:0));
}
function targetMinAngle(m) { return m*6; }

function draw() {
  ctx.clearRect(0,0,W,W);
  ctx.setLineDash([]);

  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.fillStyle='#FAFAF8'; ctx.fill();
  ctx.strokeStyle='#3C3489'; ctx.lineWidth=5; ctx.stroke();

  for (let i=1;i<=12;i++) {
    const a = d2r((i/12)*360-90);
    ctx.beginPath();
    ctx.moveTo(CX+(R-1)*Math.cos(a), CY+(R-1)*Math.sin(a));
    ctx.lineTo(CX+(R-11)*Math.cos(a), CY+(R-11)*Math.sin(a));
    ctx.strokeStyle='#888780'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#3C3489'; ctx.font='600 18px -apple-system, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(i, CX+(R-25)*Math.cos(a), CY+(R-25)*Math.sin(a));
  }
  for (let i=0;i<60;i++) {
    if (i%5===0) continue;
    const a = d2r((i/60)*360-90);
    ctx.beginPath();
    ctx.moveTo(CX+(R-1)*Math.cos(a), CY+(R-1)*Math.sin(a));
    ctx.lineTo(CX+(R-6)*Math.cos(a), CY+(R-6)*Math.sin(a));
    ctx.strokeStyle='#B4B2A9'; ctx.lineWidth=1; ctx.stroke();
  }

  // 分針
  const mA = dispM();
  const mrad = d2r(mA-90);
  const [mTx,mTy] = tipXY(mA, M_LEN);
  ctx.beginPath();
  ctx.moveTo(CX-24*Math.cos(mrad), CY-24*Math.sin(mrad));
  ctx.lineTo(mTx, mTy);
  ctx.strokeStyle='#185FA5'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();

  // 時針
  const hA = dispH();
  const hrad = d2r(hA-90);
  const [hTx,hTy] = tipXY(hA, H_LEN);
  ctx.beginPath();
  ctx.moveTo(CX-20*Math.cos(hrad), CY-20*Math.sin(hrad));
  ctx.lineTo(hTx, hTy);
  ctx.strokeStyle='#D85A30'; ctx.lineWidth=8; ctx.lineCap='round'; ctx.stroke();

  ctx.beginPath(); ctx.arc(CX,CY,8,0,Math.PI*2); ctx.fillStyle='#3C3489'; ctx.fill();
  ctx.beginPath(); ctx.arc(CX,CY,3,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();

  ctx.beginPath(); ctx.arc(hTx,hTy,11,0,Math.PI*2);
  ctx.fillStyle = dragging==='h' ? '#D85A30' : 'rgba(216,90,48,0.3)'; ctx.fill();
  ctx.beginPath(); ctx.arc(mTx,mTy,11,0,Math.PI*2);
  ctx.fillStyle = dragging==='m' ? '#185FA5' : 'rgba(24,95,165,0.3)'; ctx.fill();
}

function getXY(e) {
  const rect = canvas.getBoundingClientRect();
  const scale = W/rect.width;
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX-rect.left)*scale, (src.clientY-rect.top)*scale];
}

function onStart(e) {
  e.preventDefault();
  const [x,y] = getXY(e);
  const [hTx,hTy] = tipXY(dispH(), H_LEN);
  const [mTx,mTy] = tipXY(dispM(), M_LEN);
  const hd = dist(x,y,hTx,hTy);
  const md = dist(x,y,mTx,mTy);
  if (hd > GRAB_R && md > GRAB_R) return;
  dragging = hd <= md ? 'h' : 'm';
  if (dragging==='h') hourAngleFree = hourAngle;
  if (dragging==='m') minAngleFree = minAngle;
  draw();
}

function onMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const [x,y] = getXY(e);
  const ang = getAngleDeg(x,y);
  if (dragging==='h') hourAngleFree = ang;
  else minAngleFree = ang;
  draw();
}

function onEnd() {
  if (dragging==='h') hourAngle = snapTo(hourAngleFree, 15);
  if (dragging==='m') minAngle = snapTo(minAngleFree, 30);
  dragging = null;
  draw();
}

canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('touchstart', onStart, {passive:false});
window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('mouseup', onEnd);
window.addEventListener('touchend', onEnd);

// 音效：Tone.js 木琴音色
function playCorrect() {
  try {
    Tone.start();
    const synth = new Tone.Synth({
      oscillator: { type: 'triangle' },
      envelope: { attack: 0.005, decay: 0.3, sustain: 0.05, release: 0.4 }
    }).toDestination();
    const now = Tone.now();
    ['C5','E5','G5','C6'].forEach((note, i) => {
      synth.triggerAttackRelease(note, '16n', now + i * 0.13);
    });
  } catch(e) {}
}

function playWrong() {
  try {
    Tone.start();
    const synth = new Tone.Synth({
      oscillator: { type: 'triangle' },
      envelope: { attack: 0.005, decay: 0.4, sustain: 0.05, release: 0.3 }
    }).toDestination();
    const now = Tone.now();
    ['G3','D3'].forEach((note, i) => {
      synth.triggerAttackRelease(note, '8n', now + i * 0.22);
    });
  } catch(e) {}
}

function checkAnswer() {
  if (answered) return;
  answered = true;
  total++;
  document.getElementById('total').textContent = total;
  const fb = document.getElementById('feedback');
  const {h: userH, m: userHM} = angleToHM(hourAngle);
  const userM = angleToMin(minAngle);
  const hOk = userH === targetH && userHM === targetM;
  const mOk = userM === targetM;
  if (hOk && mOk) {
    correct++;
    document.getElementById('correct').textContent = correct;
    fb.style.color='#0F6E56';
    fb.textContent='🎉 答對了！好棒！';
    playCorrect();
  } else {
    fb.style.color='#993C1D';
    fb.textContent='再試試！正確答案是 '+(targetH%12||12)+':'+String(targetM).padStart(2,'0');
    hourAngle = targetHourAngle(targetH, targetM);
    minAngle = targetMinAngle(targetM);
    playWrong();
  }
  draw();
}

const times=[];
for(let h=1;h<=12;h++){times.push([h,0]);times.push([h,30]);}
let lastIdx=-1;

function newQuestion() {
  answered=false;
  document.getElementById('feedback').textContent='';
  let idx;
  do{idx=Math.floor(Math.random()*times.length);}while(idx===lastIdx);
  lastIdx=idx;
  [targetH,targetM]=times[idx];
  document.getElementById('target-time').textContent=(targetH%12||12)+':'+String(targetM).padStart(2,'0');
  let wrongH = ((targetH+2)%12)||12;
  hourAngle = targetHourAngle(wrongH, 0);
  minAngle = targetM===0 ? targetMinAngle(30) : targetMinAngle(0);
  draw();
}

newQuestion();
</script>
</body>
</html>
